name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary target: newest stable Elixir (1.19.x) on newest OTP (28.x).
          # `erlef/setup-beam` resolves "1.19" to the latest 1.19.y.z that has
          # an OTP-28 build on hex.pm. Owns the quality gates (format,
          # credo, dialyzer, integration).
          - elixir: "1.19"
            otp: "28"
            primary: true
          # Minimum-supported version — matches the `elixir: "~> 1.17"`
          # constraint in mix.exs. If we ever need a 1.18+ feature,
          # bump both the constraint and this matrix entry. Compile +
          # test only; quality gates run once on the primary.
          - elixir: "1.17"
            otp: "27"
            primary: false

    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          # Loose matching — "1.19" → latest patch release.
          version-type: loose

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install local Hex & rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --only $MIX_ENV

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check formatting
        if: matrix.primary
        run: mix format --check-formatted

      - name: Check for unused dependencies
        if: matrix.primary
        # Check against :dev so dev-only deps (credo, dialyxir) reach
        # their transitive helpers (bunt, erlex, file_system). Fetch
        # dev deps first.
        env:
          MIX_ENV: dev
        run: |
          mix deps.get
          mix deps.unlock --check-unused

      - name: Credo (strict)
        if: matrix.primary
        env:
          MIX_ENV: dev
        run: mix credo --strict

      - name: Cache Dialyzer PLTs
        if: matrix.primary
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Build Dialyzer PLT
        if: matrix.primary
        env:
          MIX_ENV: dev
        run: mix dialyzer --plt

      - name: Dialyzer
        if: matrix.primary
        env:
          MIX_ENV: dev
        run: mix dialyzer --format github

      - name: Run test suite (default tiers)
        run: mix test --warnings-as-errors

      - name: Run extended tiers (slow, property, real_git)
        # `git` ships on ubuntu-24.04 runners, so :real_git tests run.
        run: mix test --warnings-as-errors --include slow --include real_git

      - name: Run integration tests (live network, unauthenticated)
        # Runs on EVERY push and PR — the integration suite covers
        # the library's core advertised workflows (partial-clone
        # read-path, lazy-clone read-path) against an owned public
        # fixture (`ivarvong/pyex`). These are the tests the
        # reviewer-filed bug would have caught if they'd been in
        # the default CI tier. GitHub's reliability is high enough
        # that transient failures are rare; if one does happen, a
        # re-run button costs less than shipping a broken read
        # path to adopters.
        #
        # Only runs on the primary matrix entry — quality gates
        # (and live-network tiers) are primary-only.
        if: matrix.primary
        run: mix test --warnings-as-errors --only integration

      - name: Run authenticated integration tests (live network, secrets)
        # Push-to-main only — these need PATs that aren't available
        # on fork-based PR runs. Scoped tightly: only the tests
        # tagged `:github_private` / `:github_private_write`, which
        # exercise paths that require an authenticated PAT (push,
        # private-repo clone).
        if: matrix.primary && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_PRIVATE_REPO: ${{ secrets.GITHUB_PRIVATE_REPO }}
          GITHUB_PRIVATE_TOKEN: ${{ secrets.GITHUB_PRIVATE_TOKEN }}
        run: mix test --warnings-as-errors --only github_private
        continue-on-error: true
